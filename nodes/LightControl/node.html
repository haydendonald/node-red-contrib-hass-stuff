<script type="text/javascript" id="node-light-control">
    RED.nodes.registerType("light-control", {
        category: "HASS Stuff",
        color: "#ffcc00",
        inputs: 1,
        outputs: 1,
        icon: "bulb.svg",
        defaults: {
            name: { value: "" },
            configNode: { value: '', type: "light-control-config", required: true },
        },
        label: function () {
            return this.name || "Light Control"
        }
    });
</script>


<script type="text/html" data-template-name="light-control">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-configNode">Config</label>
        <input type="text" id="node-input-configNode" />
    </div>
</script>
<script type="text/html" data-help-name="light-control">
</script>
