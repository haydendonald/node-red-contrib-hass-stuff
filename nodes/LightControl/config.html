<script type="text/javascript" id="node-light-control-config">
    RED.nodes.registerType("light-control-config", {
        category: "config",
        defaults: {
            name: { value: "" },
            server: { value: '', type: "server", required: true },
        },
        label: function () {
            return this.name || "Light Control Config"
        }
    });
</script>

<script type="text/html" data-template-name="light-control-config">
