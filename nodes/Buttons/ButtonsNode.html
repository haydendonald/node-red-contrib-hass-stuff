<script type="text/javascript" id="node-buttons-node">
    RED.nodes.registerType("buttons-node", {
        category: "HASS Stuff",
        color: "#ffcc00",
        inputs: 0,
        outputs: 2,
        outputLabels: ["detected", "not detected"],
        icon: "alert.svg",
        paletteLabel: "Buttons",
        defaults: {
            name: { value: "" },
            buttonsConfigNode: { value: '', type: "buttons-config-node", required: true },
            button: { value: "", required: true },
            type: { value: "", required: true }
        },
        label: function () {
            return this.name || "Buttons"
        },
        oneditprepare: function () {
            $("#node-input-button").typedInput({
                types: [
                    {
                        value: "button",
                        options: [
                            { value: "1", label: "1" },
                            { value: "2", label: "2" },
                            { value: "3", label: "3" },
                            { value: "4", label: "4" }
                        ]
                    }
                ]
            });

            $("#node-input-type").typedInput({
                types: [
                    {
                        value: "type",
                        options: [
                            { value: "single", label: "Single Click" },
                            { value: "held", label: "Held" }
                        ]
                    }
                ]
            });
        }
    });
</script>

<script type="text/html" data-template-name="buttons-node">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-buttonsConfigNode">Config</label>
        <input type="text" id="node-input-buttonsConfigNode" />
    </div>
    <div class="form-row">
        <label for="node-input-button">Button</label>
        <input type="text" id="node-input-button">
    </div>
    <div class="form-row">
        <label for="node-input-type">Type</label>
        <input type="text" id="node-input-type">
    </div>
</script>
<script type="text/html" data-help-name="buttons-node">
</script>
